<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Создать возможность</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      --color-primary: #6366F1;
      --color-accent: #10B981;
      --color-urgent: #EF4444;
      --color-bg-light: #F8FAFC;
      --color-bg-dark: #0F172A;
      --color-text-light: #1E293B;
      --color-text-dark: #F1F5F9;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--color-bg-light);
      color: var(--color-text-light);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    body.dark-theme {
      background: var(--color-bg-dark);
      color: var(--color-text-dark);
    }

    h1, h2, h3 {
      font-family: 'Merriweather', serif;
      letter-spacing: -0.02em;
      font-weight: 700;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: rgba(248, 250, 252, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(203, 213, 225, 0.2);
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      transition: all 0.3s ease;
    }

    body.dark-theme .header {
      background: rgba(15, 23, 42, 0.95);
      border-bottom-color: rgba(71, 85, 105, 0.3);
    }

    .header-back {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: rgba(99, 102, 241, 0.1);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s ease;
    }

    .header-back:hover {
      background: rgba(99, 102, 241, 0.2);
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      font-family: 'Merriweather', serif;
    }

    .header-status {
      font-size: 11px;
      color: #94A3B8;
    }

    body.dark-theme .header-status {
      color: #CBD5E1;
    }

    .theme-toggle {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: rgba(99, 102, 241, 0.1);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s ease;
    }

    .theme-toggle:hover {
      background: rgba(99, 102, 241, 0.2);
    }

    .container {
      margin-top: 56px;
      margin-bottom: 100px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      padding: 20px 16px;
    }

    .completion-bar {
      width: 100%;
      height: 6px;
      background: rgba(203, 213, 225, 0.3);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 4px;
      animation: slideDown 0.6s ease;
    }

    body.dark-theme .completion-bar {
      background: rgba(71, 85, 105, 0.3);
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .completion-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-primary) 0%, var(--color-accent) 100%);
      transition: width 0.3s ease;
      border-radius: 3px;
    }

    .completion-text {
      font-size: 11px;
      color: #94A3B8;
      text-align: right;
      margin-bottom: 20px;
    }

    body.dark-theme .completion-text {
      color: #CBD5E1;
    }

    .form-section {
      margin-bottom: 32px;
      animation: slideUp 0.6s ease forwards;
      opacity: 0;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-section:nth-child(2) { animation-delay: 0.1s; }
    .form-section:nth-child(3) { animation-delay: 0.2s; }
    .form-section:nth-child(4) { animation-delay: 0.3s; }
    .form-section:nth-child(5) { animation-delay: 0.4s; }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--color-text-light);
      font-family: 'Merriweather', serif;
    }

    body.dark-theme .section-title {
      color: var(--color-text-dark);
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--color-text-light);
    }

    body.dark-theme label {
      color: var(--color-text-dark);
    }

    input, textarea, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(203, 213, 225, 0.5);
      border-radius: 8px;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      background: white;
      color: var(--color-text-light);
      transition: all 0.2s ease;
      box-sizing: border-box;
    }

    body.dark-theme input,
    body.dark-theme textarea,
    body.dark-theme select {
      background: rgba(30, 41, 59, 0.8);
      color: var(--color-text-dark);
      border-color: rgba(71, 85, 105, 0.5);
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .segment-toggle {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .segment-btn {
      padding: 10px 12px;
      background: rgba(203, 213, 225, 0.2);
      border: 1px solid rgba(203, 213, 225, 0.4);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--color-text-light);
    }

    body.dark-theme .segment-btn {
      background: rgba(71, 85, 105, 0.2);
      border-color: rgba(71, 85, 105, 0.5);
    }

    .segment-btn.active {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: white;
    }

    .segment-btn:hover {
      border-color: var(--color-primary);
    }

    .helper-text {
      font-size: 10px;
      color: #94A3B8;
      margin-top: 6px;
    }

    body.dark-theme .helper-text {
      color: #CBD5E1;
    }

    .tip-box {
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 8px;
      padding: 12px;
      font-size: 11px;
      color: #94A3B8;
      margin-top: 8px;
    }

    body.dark-theme .tip-box {
      background: rgba(99, 102, 241, 0.1);
      border-color: rgba(99, 102, 241, 0.3);
      color: #CBD5E1;
    }

    .cta-section {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(248, 250, 252, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(203, 213, 225, 0.3);
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      z-index: 30;
    }

    body.dark-theme .cta-section {
      background: rgba(15, 23, 42, 0.95);
      border-top-color: rgba(71, 85, 105, 0.3);
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--color-accent);
      color: white;
    }

    .btn-primary:hover {
      background: #059669;
    }

    .btn-secondary {
      background: rgba(99, 102, 241, 0.1);
      color: var(--color-primary);
    }

    .btn-secondary:hover {
      background: rgba(99, 102, 241, 0.2);
    }

    @media (min-width: 768px) {
      .cta-section {
        position: static;
        background: transparent;
        border-top: none;
        padding: 32px 0;
        gap: 16px;
        margin-top: 40px;
      }

      .btn {
        max-width: 200px;
      }

      .container {
        margin-bottom: 0;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <button class="header-back">← Назад</button>
    <div style="flex: 1; text-align: center;">
      <div class="header-title">Создать возможность</div>
      <div class="header-status" id="autosaveStatus">Сохранено</div>
    </div>
    <button class="theme-toggle" id="themeToggle">🌙</button>
  </header>

  <!-- MAIN CONTENT -->
  <div class="container">
    <!-- COMPLETION PROGRESS -->
    <div class="completion-bar">
      <div class="completion-fill" id="completionFill" style="width: 15%;"></div>
    </div>
    <div class="completion-text">
      <span id="completionText">15%</span> заполнено
    </div>

    <!-- TYPE SELECTION -->
    <div class="form-section">
      <div class="section-title">Тип возможности</div>
      <div class="segment-toggle">
        <button class="segment-btn active" data-type="vacancy">Вакансия</button>
        <button class="segment-btn" data-type="internship">Стажировка</button>
        <button class="segment-btn" data-type="event">Ивент</button>
        <button class="segment-btn" data-type="mentorship">Менторство</button>
      </div>
    </div>

    <!-- BASIC INFO -->
    <div class="form-section">
      <div class="section-title">Основное</div>
      
      <div class="form-group">
        <label for="title">Название позиции или мероприятия *</label>
        <input type="text" id="title" placeholder="Frontend Developer" required>
      </div>

      <div class="form-group">
        <label for="description">Краткое описание *</label>
        <textarea id="description" placeholder="Расскажи кратко о возможности..."></textarea>
        <div class="tip-box">💡 Первые 50 символов видны в карточке в ленте</div>
      </div>
    </div>

    <!-- REQUIREMENTS -->
    <div class="form-section">
      <div class="section-title">Требования</div>
      
      <div class="form-group">
        <label for="skills">Навыки</label>
        <input type="text" id="skills" placeholder="React, TypeScript, Node.js...">
        <div class="helper-text">Разделяй запятой</div>
      </div>

      <div class="form-group">
        <label for="level">Уровень</label>
        <select id="level">
          <option value="">Выбери уровень</option>
          <option value="intern">Intern (Стажер)</option>
          <option value="junior">Junior</option>
          <option value="junior+">Junior+</option>
          <option value="middle">Middle</option>
          <option value="senior">Senior</option>
        </select>
      </div>
    </div>

    <!-- CONDITIONS -->
    <div class="form-section">
      <div class="section-title">Условия</div>
      
      <div class="form-group">
        <label for="format">Формат</label>
        <select id="format">
          <option value="">Выбери формат</option>
          <option value="office">Офис</option>
          <option value="hybrid">Гибрид</option>
          <option value="remote">Удалённо</option>
        </select>
      </div>

      <div class="form-group">
        <label for="location">Адрес или город</label>
        <input type="text" id="location" placeholder="Москва, ул. Льва Толстого, 16">
      </div>

      <div class="form-group">
        <label for="salary">Зарплата (от-до или по договорённости)</label>
        <input type="text" id="salary" placeholder="120000-180000">
      </div>

      <div class="form-group">
        <label for="deadline">Дедлайн</label>
        <input type="date" id="deadline">
      </div>
    </div>

    <!-- MEDIA -->
    <div class="form-section">
      <div class="section-title">Медиа</div>
      
      <div class="form-group">
        <label>Загрузить фото (до 5)</label>
        <input type="file" id="media" accept="image/*" multiple>
        <div class="tip-box">📸 Карточки с фото получают +15% в рейтинге</div>
      </div>
    </div>
  </div>

  <!-- CTA SECTION -->
  <div class="cta-section">
    <button class="btn btn-secondary">← Назад</button>
    <button class="btn btn-primary">✓ Опубликовать</button>
  </div>

  <script>
    // Theme toggle
    const themeToggle = document.getElementById('themeToggle');
    
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-theme');
      const isDark = document.body.classList.contains('dark-theme');
      themeToggle.textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // Load saved theme
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark-theme');
      themeToggle.textContent = '☀️';
    }

    // Type selection
    const typeButtons = document.querySelectorAll('[data-type]');
    typeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        typeButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateCompletion();
      });
    });

    // Update completion percentage
    function updateCompletion() {
      const fields = {
        'title': 15,
        'description': 15,
        'skills': 15,
        'level': 10,
        'format': 10,
        'location': 10,
        'salary': 10,
        'deadline': 5
      };

      let completion = 0;
      for (const [field, points] of Object.entries(fields)) {
        const element = document.getElementById(field);
        if (element && element.value.trim()) {
          completion += points;
        }
      }

      // Cap at 95 to suggest always something to add
      completion = Math.min(completion, 95);

      const fill = document.getElementById('completionFill');
      fill.style.width = completion + '%';
      document.getElementById('completionText').textContent = completion + '%';

      // Auto-save indicator
      const status = document.getElementById('autosaveStatus');
      status.textContent = 'Сохраняю...';
      setTimeout(() => {
        status.textContent = 'Сохранено';
      }, 1000);
    }

    // Form inputs tracking
    const formInputs = document.querySelectorAll('input, textarea, select');
    formInputs.forEach(input => {
      input.addEventListener('change', updateCompletion);
      input.addEventListener('keyup', updateCompletion);
    });

    // Back button
    document.querySelector('.header-back').addEventListener('click', () => {
      window.history.back();
    });

    // Secondary back button
    document.querySelectorAll('.btn-secondary')[0].addEventListener('click', () => {
      window.history.back();
    });

    // Publish button
    document.querySelector('.btn-primary').addEventListener('click', () => {
      const completion = parseInt(document.getElementById('completionText').textContent);
      if (completion < 50) {
        alert('Заполни хотя бы 50% полей перед публикацией');
        return;
      }
      alert('Возможность успешно опубликована!');
    });

    // Initial completion
    updateCompletion();
  </script>

</body>
</html>
