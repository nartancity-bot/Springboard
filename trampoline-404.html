<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Страница не найдена</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      --color-primary: #6366F1;
      --color-accent: #10B981;
      --color-urgent: #EF4444;
      --color-bg-light: #F8FAFC;
      --color-bg-dark: #0F172A;
      --color-text-light: #1E293B;
      --color-text-dark: #F1F5F9;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--color-bg-light);
      color: var(--color-text-light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    body.dark-theme {
      background: var(--color-bg-dark);
      color: var(--color-text-dark);
    }

    h1, h2 {
      font-family: 'Merriweather', serif;
      letter-spacing: -0.02em;
      font-weight: 700;
    }

    .container {
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    .content {
      animation: slideDown 0.6s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .illustration {
      font-size: 120px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    .code {
      font-size: 48px;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 8px;
      font-family: 'Merriweather', serif;
      animation: slideUp 0.6s ease 0.1s both;
      opacity: 0;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      animation: slideUp 0.6s ease 0.2s both;
      opacity: 0;
    }

    .description {
      font-size: 14px;
      color: #94A3B8;
      margin-bottom: 32px;
      line-height: 1.6;
      animation: slideUp 0.6s ease 0.3s both;
      opacity: 0;
    }

    body.dark-theme .description {
      color: #CBD5E1;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: slideUp 0.6s ease 0.4s both;
      opacity: 0;
    }

    .btn {
      padding: 12px 16px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--color-accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary:hover {
      background: #059669;
    }

    .btn-secondary {
      background: rgba(99, 102, 241, 0.1);
      color: var(--color-primary);
      border: 1px solid rgba(99, 102, 241, 0.3);
    }

    .btn-secondary:hover {
      background: rgba(99, 102, 241, 0.15);
      border-color: var(--color-primary);
    }

    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: rgba(99, 102, 241, 0.1);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s ease;
      z-index: 50;
    }

    .back-button:hover {
      background: rgba(99, 102, 241, 0.2);
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: rgba(99, 102, 241, 0.1);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.2s ease;
      z-index: 50;
    }

    .theme-toggle:hover {
      background: rgba(99, 102, 241, 0.2);
    }

    .decoration {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      opacity: 0.05;
      pointer-events: none;
    }

    .decoration-1 {
      background: var(--color-primary);
      top: -100px;
      left: -100px;
    }

    .decoration-2 {
      background: var(--color-accent);
      bottom: -100px;
      right: -100px;
    }

    @media (max-width: 480px) {
      .code {
        font-size: 36px;
      }

      .title {
        font-size: 20px;
      }

      .illustration {
        font-size: 80px;
      }
    }
  </style>
</head>
<body>

  <button class="back-button">←</button>
  <button class="theme-toggle" id="themeToggle">🌙</button>

  <div class="decoration decoration-1"></div>
  <div class="decoration decoration-2"></div>

  <div class="container">
    <div class="content">
      <div class="illustration">🚀</div>
      <div class="code">404</div>
      <h1 class="title">Эта страница куда-то улетела</h1>
      <p class="description">
        Возможно, вакансия закрыта, ссылка устарела или вы просто попали не туда.
        <br>
        Не волнуйтесь, мы вас найдём! 
      </p>
      
      <div class="buttons">
        <button class="btn btn-primary" onclick="goHome()">
          <span>🏠</span>
          На главную
        </button>
        <button class="btn btn-secondary" onclick="history.back()">
          ← Назад
        </button>
      </div>
    </div>
  </div>

  <script>
    // Theme toggle
    const themeToggle = document.getElementById('themeToggle');
    
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-theme');
      const isDark = document.body.classList.contains('dark-theme');
      themeToggle.textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // Load saved theme
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark-theme');
      themeToggle.textContent = '☀️';
    }

    // Go home
    function goHome() {
      window.location.href = 'index.html';
    }

    // Back button
    document.querySelector('.back-button').addEventListener('click', () => {
      window.history.back();
    });

    // 404 Easter egg
    document.addEventListener('keydown', (e) => {
      if (e.key === '404' || (e.keyCode === 52 && e.shiftKey === false)) {
        console.log('🚀 You found the rocket! Welcome to Трамплин!');
      }
    });
  </script>

</body>
</html>
